name: Release

# Релиз macOS .dmg (universal: Apple Silicon + Intel) на пуш тега vX.Y.Z.
# Подпись ad-hoc (без Apple-сертификата) → у пользователя предупреждение Gatekeeper,
# снимается install.sh (xattr -dr com.apple.quarantine). Для нотаризации — добавить
# секреты Apple Developer + TAURI_SIGNING_* (см. доку tauri-action).
# tauri-action закреплён на @v0 (актуальный мажор, поддерживает Tauri 2) — менять не нужно.

on:
  push:
    tags:
      - 'v*'

jobs:
  release-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # node-gyp (через node-pty/electron-builder postinstall) использует distutils,
      # которого нет в Python 3.12+ на свежих раннерах → npm ci падает. Python 3.11
      # ещё содержит distutils, node-gyp находит его на PATH и собирает нативные модули.
      - name: Python (distutils for node-gyp)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Rust (universal targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install deps
        run: npm ci

      # tauri-action сам вызывает beforeBuildCommand (npm run build:web) из tauri.conf.json,
      # затем собирает universal .dmg и создаёт GitHub Release с ассетом.
      - name: Build + release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'opdeck ${{ github.ref_name }}'
          releaseBody: 'См. историю коммитов.'
          releaseDraft: false
          prerelease: false
          args: --target universal-apple-darwin
